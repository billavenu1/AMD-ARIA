services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    ports:
      - "8000:8000"
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    pull_policy: always
    user: root
    restart: always
  elyra:
    image: elyra/elyra:3.15.0
    command:
      - jupyter
      - lab
      - --debug
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --ServerApp.base_url=/elyra
    ports:
      - "8888:8888"
    volumes:
      - ./elyra_work:/home/jovyan/work
      - ./elyra_data:/home/jovyan/.local/share/jupyter
      - ./jupyter_server_config.py:/home/jovyan/.jupyter/jupyter_server_config.py:ro
    working_dir: /home/jovyan/work
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - ARIA_API_URL=http://host.docker.internal:5055
      - VLLM_BASE_URL=http://vllm:8000/v1
      - QDRANT_URL=http://qdrant:6333
      - CHROMA_URL=http://chroma:8000
    depends_on:
      - surrealdb
    pull_policy: always
    restart: always
  open_notebook:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8502:8502"
      - "5055:5055"
    env_file:
      - ./docker.env
    depends_on:
      - surrealdb
    volumes:
      - ./notebook_data:/app/data
    restart: always
    
